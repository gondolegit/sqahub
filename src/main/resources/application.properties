spring.application.name=SQAHUB Backend

# ==================================
# 1. SERVER CONFIGURATION
# ==================================
server.port=8080

# ==================================
# 2. DATABASE CONFIGURATION (MySQL Example)
# Ganti dengan konfigurasi database Anda
# ==================================
spring.datasource.url=jdbc:mysql://localhost:3306/sqahub_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Konfigurasi JPA (Hibernate)
# ddl-auto: create-drop (Hanya untuk dev, ganti ke 'update' atau 'none' di production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Jika menggunakan MySQL 8 ke atas, tambahkan ini
spring.jpa.properties.hibernate.format-sql=true

# ==================================
# 3. JWT SECURITY CONFIGURATION
# ==================================
# Kunci rahasia untuk menandatangani JWT. HARUS diganti dengan string yang panjang dan kompleks.
application.security.jwt.secret-key=19f72843e780b552ec244b70d5c6f01628e18120f3d573b298dd8db44cc47bf4e0857491868a319a24d0323589ea280c37bfa4601529622570b3fcf9760ec0c5
# Masa berlaku token dalam milidetik (Contoh: 24 jam)
application.security.jwt.expiration=86400000
# Nama header yang digunakan untuk mengirim token
app.security.jwt.header=Authorization
# Prefix token (Contoh: "Bearer ")
app.security.jwt.token-prefix=Bearer